# .github/workflows/update_events_csv.yml
name: Update events CSV from Google Calendar (:03 + every 10m)

on:
  schedule:
    - cron: "3/10 * * * *"   # UTC minutes: 03,13,23,33,43,53
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Paris
      REMOVAL_DELAY_HOURS: 30
      # How far to expand recurring events for the website:
      PAST_DAYS: 7
      FUTURE_DAYS: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Initialize lightweight package.json
        run: |
          npm init -y
          npm pkg set type=module

      - name: Install runtime dependencies
        run: |
          npm i --no-audit --no-fund \
            ical-expander@3 \
            luxon@3 \
            papaparse@5 \
            rrule@2

      - name: Generate CSV from ICS
        run: node scripts/ics_to_csv.js
        env:
          GCAL_ICS_URL: ${{ secrets.GCAL_ICS_URL }}

      - name: Commit CSV if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kizbourges_events_template1.csv
          if ! git diff --cached --quiet; then
            git commit -m "chore: update events CSV"
            git push
          else
            echo "No changes to commit."
          fi
